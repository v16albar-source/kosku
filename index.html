
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.nav-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:10px 12px;background:var(--surface-1);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:100}
.nav-btn{padding:4px 10px;font-size:11px;border:0.5px solid var(--border);border-radius:6px;background:var(--surface-2);color:var(--text-secondary);cursor:pointer;white-space:nowrap;transition:all .15s}
.nav-btn:hover{background:var(--surface-1);color:var(--text-primary)}
.nav-btn.active{background:#4F46E5;color:#fff;border-color:#4F46E5}
.layer{display:none;padding:0}
.layer.active{display:block}

/* Sidebar */
.sidebar{width:180px;background:#3730A3;min-height:100%;padding:12px 0;flex-shrink:0}
.sidebar-logo{padding:12px 16px 16px;color:#fff;font-weight:500;font-size:13px;border-bottom:1px solid rgba(255,255,255,.15);margin-bottom:8px}
.sidebar-logo span{display:block;font-size:10px;opacity:.7;font-weight:400}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:7px 16px;color:rgba(255,255,255,.75);font-size:12px;cursor:pointer;transition:background .15s}
.sidebar-item:hover{background:rgba(255,255,255,.1)}
.sidebar-item.active{background:#4F46E5;color:#fff}
.sidebar-item i{font-size:15px;width:16px}

/* Layout shell */
.shell{display:flex;min-height:600px;background:var(--surface-0)}
.main{flex:1;overflow:hidden}
.topbar{padding:12px 20px;background:var(--surface-2);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.topbar h2{font-size:15px;font-weight:500;color:var(--text-primary)}
.content{padding:16px 20px}

/* Cards / UI */
.stat-card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:10px;padding:12px 14px}
.stat-num{font-size:22px;font-weight:500;color:var(--text-primary)}
.stat-label{font-size:11px;color:var(--text-muted)}
.stat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:10px;padding:14px}
.card h3{font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:10px}
.tbl{width:100%;font-size:11.5px;border-collapse:collapse}
.tbl th{color:var(--text-muted);font-weight:500;text-align:left;padding:5px 8px;border-bottom:0.5px solid var(--border)}
.tbl td{padding:5px 8px;border-bottom:0.5px solid var(--border);color:var(--text-primary)}
.tbl tr:last-child td{border:none}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.badge-green{background:#D1FAE5;color:#065F46}
.badge-red{background:#FEE2E2;color:#991B1B}
.badge-yellow{background:#FEF3C7;color:#92400E}
.badge-blue{background:#DBEAFE;color:#1E40AF}
.badge-purple{background:#EDE9FE;color:#5B21B6}
.btn{padding:6px 14px;border-radius:7px;font-size:12px;cursor:pointer;border:none;font-weight:500}
.btn-primary{background:#4F46E5;color:#fff}
.btn-secondary{background:var(--surface-1);border:0.5px solid var(--border);color:var(--text-primary)}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:5px}
.btn-green{background:#059669;color:#fff}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11.5px;color:var(--text-secondary);margin-bottom:4px;font-weight:500}
.form-control{width:100%;padding:7px 10px;border:0.5px solid var(--border);border-radius:7px;font-size:12px;background:var(--surface-2);color:var(--text-primary)}
.notif-item{display:flex;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);align-items:flex-start}
.notif-item:last-child{border:none}
.notif-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.section-title{font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid var(--border)}
.avatar{width:32px;height:32px;border-radius:50%;background:#4F46E5;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:500;flex-shrink:0}
.row-action{display:flex;gap:4px}
.login-wrap{min-height:600px;background:linear-gradient(135deg,#EEF2FF 0%,#E0E7FF 100%);display:flex;align-items:center;justify-content:center}
.login-card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:14px;padding:28px 28px;width:340px}

layers.forEach((l,idx)=>{

  btn.className = 'nav-btn' + (idx===0?' active':'');
  btn.innerHTML = `<i class="ti ${l.icon}" aria-hidden="true"></i> ${l.label}`;
  btn.onclick = ()=>{
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));

    document.querySelectorAll('.layer').forEach(lv=>lv.classList.remove('active'));
    document.getElementById('layer-'+l.id).classList.add('active');
  };
  nav.appendChild(btn);

  const div = document.createElement('div');
  div.className = 'layer' + (idx===0?' active':'');
  div.id = 'layer-'+l.id;
  div.innerHTML = html[l.id] || '<div style="padding:20px;color:var(--text-muted)">Layer ini sedang dalam pengembangan.</div>';
  layersDiv.appendChild(div);
});
</script>
